[global]
# PyPI index configuration.
# The build queries these indexes (in order) when downloading extra packages
# listed in requirements-wasm-extras.in.  At runtime, micropip.set_index_urls()
# is configured with the same URLs so the browser can fetch packages on demand.
#
# index-url: primary index (replaces pypi.org)
# extra-index-url: additional indexes (searched after index-url)
# pypi.org is always used as a final fallback.
#
# index-url = https://gitlab.example.com/api/v4/projects/123/-/packages/pypi/simple/
extra-index-url = https://cee-gitlab.sandia.gov/api/v4/projects/52235/packages/pypi/simple
# proxy = http://proxy.example.com:8080
# trusted-host = gitlab.example.com
# cert = /path/to/ca-bundle.crt

[pyodide]
# Base URL for Pyodide files in the GitLab Generic Package Registry.
# When set, the build fetches only core runtime files (~25MB) from here.
# The browser fetches package wheels from this URL at runtime on demand.
# Populated by: python scripts/upload_pyodide_packages.py --pyodide-version VERSION
#
# cdn-url = https://gitlab.example.com/api/v4/projects/PROJECT_ID/packages/generic/pyodide/PYODIDE_VERSION/
#
# When NOT set, the build downloads the full Pyodide tarball from GitHub
# and strips packages (pointing them to cdn.jsdelivr.net for runtime fetch).

[oauth]
# OAuth Application ID for launch.html and create.html.
# Register a non-confidential app at GitLab → User Settings → Applications
# with redirect URIs (one per line):
#   http://YOUR_PAGES_URL/launch.html
#   http://YOUR_PAGES_URL/create.html
# Scope: api  (launch.html only needs read_api; create.html needs api)
# client-id = YOUR_APPLICATION_ID

# GitLab instance URL (used by launch.html / create.html for API calls)
# gitlab-url = https://gitlab.example.com

# Template project to fork via create.html (numeric ID or URL-encoded path)
# template-project-id = 42

# Pages URL where marimo site is deployed (for badge links in create.html)
# pages-url = http://group.gitlab-pages.example.com/marimo-offline-pages
